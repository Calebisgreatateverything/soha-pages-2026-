<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SoHa Car Seating 26'</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f7f7f7;
                display: flex;
                flex-direction: column;
                height: 100vh;
                width: 100%;
                overflow: hidden;
            }

            #topbar {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 55px;
                background-color: #ffffff;
                gap: 12px;
                border-bottom: 2px solid #e0e0e0;
            }

            #aCar, #bCar {
                padding: 10px 18px;
                font-size: 16px;
                cursor: pointer;
                border: none;
                border-radius: 6px;
                color: white;
            }

            #aCar {
                background-color: #007bff;
                border: solid 2px #00376e;
            }

            #bCar {
                background-color: #00376e;
                border: solid 2px #007bff;
            }

            #content {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: calc(100% - 55px);
                background-color: #f7f7f7;
            }

            #carContainer {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 70%;
                height: 80%;
                background-color: #e5e5e5;
                border-radius: 30px;
                padding-top: 35px;
                box-shadow: 0 0 15px rgba(0,0,0,0.15);
                padding-right: 35px;
                padding-left: 35px;

            }

            .row {
                display: flex;
                justify-content: space-between;
                width: 100%;
                padding-left: 25px;
                padding-right: 25px;
                margin-bottom: 45px;
            }

            .carseat {
                border-radius: 9999px;
                width: 90px;
                height: 90px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background-color: white;
                box-shadow: 0 0 8px rgba(0,0,0,0.15);
                font-size: 42px;
            }

            .seatName {
                font-size: 14px;
                margin-top: 6px;
                text-align: center;
                color: #333;
            }

            #welcome {
                text-align: center;
            }

            #return {
                width: 20%;
                margin-left: 20px;
                margin-bottom: 20px;
                border-radius: 4px;
                border: none;
                background-color: #00376e;
                color: white;
            }
        </style>
    </head>
    <body>
        <div id="topbar">
            <button id="aCar">Angie's Car</button>
            <button id="bCar">Craig's Car</button>
        </div>

        <p id="welcome">Hello <span id="name"></span>! Your seat is the <span id="seat-location"></span> in <span id="user_car"></span>.</p>

        <div id="content">
            <div id="carContainer"></div>
        </div>

        <button id="return">Return to Homepage</button>

        <script>
            const carContainer = document.getElementById("carContainer");
            const welcome = document.getElementById("welcome");
            const nameSpan = document.getElementById("name");
            const seatSpan = document.getElementById("seat-location");
            const carSpan = document.getElementById("user_car");

            const angieSeats = {
                frontLeft:  { name: "Angie", emoji: "👨‍🦲", color: "#ffd500" },
                frontRight: { name: "Covina", emoji: "😛", color: "#ff0cca" },
                midLeft:    { name: "Caleb", emoji: "⛈️", color: "#434ff7" },
                midRight:   { name: "Clodia", emoji: "🥱", color: "#c905fa" },
                backLeft:   { name: "Celine", emoji: "💩", color: "#4b2704" },
                backMid:    { name: "Claim", emoji: "✅", color: "#2bff00" },
                backRight:  { name: "Colin", emoji: "📱", color: "#7e7e7e" }
            };

            const craigSeats = {
                frontLeft:  { name: "Craig", emoji: "👩", color: "#ff0000" },
                frontRight: { name: "Chloe", emoji: "🛟", color: "#11c3df" },
                midLeft:    { name: "", emoji: "❓", color: "#ffffff" },
                midMid:     { name: "", emoji: "❓", color: "#ffffff" },
                midRight:   { name: "", emoji: "❓", color: "#ffffff" },
                backLeft:   { name: "", emoji: "❓", color: "#ffffff" },
                backMid:    { name: "", emoji: "❓", color: "#ffffff" },
                backRight:  { name: "", emoji: "❓", color: "#ffffff" }
            };

            const angieLayout = [
                ["frontLeft", "frontRight"],
                ["midLeft", "midRight"],
                ["backLeft", "backMid", "backRight"]
            ];

            const craigLayout = [
                ["frontLeft", "frontRight"],
                ["midLeft", "midMid", "midRight"],
                ["backLeft", "backMid", "backRight"]
            ];

            function makeCar(seats, layout) {
                carContainer.innerHTML = "";
                layout.forEach(row => {
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "row";
                    row.forEach(seatName => {
                        const seatInfo = seats[seatName];
                        const seatWrapper = document.createElement("div");
                        seatWrapper.style.display = "flex";
                        seatWrapper.style.flexDirection = "column";
                        seatWrapper.style.alignItems = "center";
                        const seat = document.createElement("div");
                        seat.className = "carseat";
                        seat.textContent = seatInfo.emoji;
                        seat.style.backgroundColor = seatInfo.color;
                        const name = document.createElement("div");
                        name.className = "seatName";
                        name.textContent = seatInfo.name;
                        seatWrapper.appendChild(seat);
                        seatWrapper.appendChild(name);
                        rowDiv.appendChild(seatWrapper);
                    });
                    carContainer.appendChild(rowDiv);
                });
            }

            document.getElementById("aCar").onclick = () => makeCar(angieSeats, angieLayout);
            document.getElementById("bCar").onclick = () => makeCar(craigSeats, craigLayout);

            makeCar(angieSeats, angieLayout);

            const params = new URLSearchParams(window.location.search);
            const userName = params.get("name");

            const returnHome = document.getElementById("return")

            returnHome.addEventListener('click', function(){
                window.location.href = 'homepage.html?name=' + encodeURIComponent(userName);
            });

            function findUser(name) {
                for (const seat in angieSeats) {
                    if (angieSeats[seat].name.toLowerCase() === name.toLowerCase()) {
                        return { car: "Angie's Car", seat };
                    }
                }
                for (const seat in craigSeats) {
                    if (craigSeats[seat].name.toLowerCase() === name.toLowerCase()) {
                        return { car: "Craig's Car", seat };
                    }
                }
                return null;
            }

            if (!userName) {
                welcome.textContent = "We could not find a seat with your name on it! Please text (+1) 217-602-9771 to be added to this chart.";
                document.getElementById("content").style.display = "none";
                document.getElementById("topbar").style.display = "none";
            } else {
                const result = findUser(userName);
                if (!result) {
                    welcome.textContent = "Error: User not found.";
                    document.getElementById("content").style.display = "none";
                    document.getElementById("topbar").style.display = "none";
                } else {
                    nameSpan.textContent = userName;
                    seatSpan.textContent = result.seat;
                    carSpan.textContent = result.car;
                }
            }
        </script>
    </body>
</html>
