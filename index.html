<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SoHa Login 26'</title>

        <style>
            body {
                display: block;
                justify-content: center;
                width: 100%;
                height: 100vh;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 0;
                margin: 0;
            }

            img {
                width: 100%;
                height: auto;
                display: block;
            }

            h1 {
                text-align: center;
                font-family: Arial, Helvetica, sans-serif;
                color: rgb(0, 50, 165);
            }

            p {
                text-align: center;
                font-family: Arial, Helvetica, sans-serif;
            }

            input {
                display: block;
                margin: 0 auto;
                width: 58%;
                height: 25px;
                border-color: rgb(6,6,101);
                border-radius: 4px;
                
            }

            button {
                display: block;
                margin: 5px auto;
                width: 60%;
                height: 25px;
                border: none;
                background-color: rgb(6, 6, 101);
                color: white;
                border-radius: 4px;
                cursor: pointer;
            }

            footer {
                margin-top: 50px;
            }
        </style>
    </head>
    <body>
        <img src="banner.png">

        <h1>South Haven 26'</h1>
        <hr style="width: 70%;">

        <p>Please enter your name into the <br>provided text area below.</p>
        <input required placeholder="Your name">
        <button id="sumbit">Login</button>

        <footer><p>Account login not working? <br>Text (+1) 217-602-9771</p></footer>

        <script>
            const allowedNames = [
                "Caleb",
                "Clodia",
                "Covina",
                "Celine",
                "Angie",
                "Colin",
                "Craig",
                "Chloe"
            ];

            document.getElementById("sumbit").onclick = () => {
                const name = document.querySelector("input").value.trim();

                if (!name) {
                    alert("Please enter your name.");
                    return;
                }

                const normalized = name.toLowerCase();
                const match = allowedNames.find(n => n.toLowerCase() === normalized);

                if (!match) {
                    alert("Incorrect name. Please try again.");
                    return;
                }

                window.location.href = `homepage.html?name=${encodeURIComponent(match)}`;
            };
        </script>
    </body>
</html>
